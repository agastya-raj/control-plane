# servers.yaml — Registry of all servers in the infrastructure mesh
#
# This file is the source of truth for what servers exist, how to reach them,
# and what they can do. Populated via protocols/register_server.md.
#
# ─────────────────────────────────────────────────────────────────────────────
schema_version: 1

# Entries live under the `servers` key below. Each entry's key is the server's
# short name (snake_case, unique, should match the SSH alias).
#
# Example entry (for documentation — remove or replace when adding real data):
#
#   gpu:
#     # ── Identity (required) ────────────────────────────────────────────────
#     hostname: "agastya-gpumachine"    # actual hostname (from `hostname`)
#     ssh_alias: "gpu"                  # Host entry in ~/.ssh/config
#     tailscale_ip: "100.72.107.96"     # output of `tailscale ip -4`
#     user: "agastya"                   # default SSH user
#
#     # ── Role + Status (required) ───────────────────────────────────────────
#     roles:                            # what this server is used for
#       - compute                       #   heavy compute / ML training
#       - homelab                       #   self-hosted services
#       - testbed                       #   research testbed
#       - dev                           #   development machine
#       - media                         #   media server
#       - sandbox                       #   sandboxed execution environment
#       # List is extensible — add custom roles as needed (e.g., hpc, storage).
#     status: active                    # active | offline | decommissioned
#                                       #   active = reachable and in use
#                                       #   offline = exists but not currently reachable
#                                       #   decommissioned = no longer in service
#
#     # ── Network (optional) ─────────────────────────────────────────────────
#     gateway: null                     # server key to jump through (ProxyJump)
#                                       #   e.g., gateway: gpu → reach via gpu
#                                       #   only single-hop supported; chaining not yet defined
#     ports: []                         # notable open ports (informational)
#     domain: null                      # base domain if serving web (e.g., "sudosu.fyi")
#
#     # ── Capabilities (required) ────────────────────────────────────────────
#     # Flat list for querying ("find a server with gpu").
#     # Add a capability after the software/hardware is confirmed present.
#     capabilities:
#       - gpu                           # has NVIDIA GPU
#       - docker                        # Docker installed and running
#       - caddy                         # Caddy reverse proxy
#       - ollama                        # Ollama LLM inference
#       - jupyter                       # Jupyter notebook server
#       - tailscale                     # Tailscale connected (should be all)
#       - claude_code                   # Claude Code installed
#       - symphony                      # Symphony orchestration installed
#       - et                            # Eternal Terminal installed
#
#     # ── Hardware (optional, but recommended) ───────────────────────────────
#     hardware:
#       cpu: "Intel i9-13900K"
#       cores: 24                       # physical cores
#       threads: 48                     # logical threads
#       ram_gb: 64
#       disk_gb: 1000                   # root partition size
#       gpu_model: "RTX 4090"           # omit if no GPU
#       gpu_vram_gb: 24                 # omit if no GPU
#
#     # ── Services (optional) ────────────────────────────────────────────────
#     # Key services running on this server. Used by health checks and deploy
#     # protocols to understand what's expected to be running.
#     services:
#       - name: "caddy"
#         type: systemd                 # systemd | docker | binary
#         port: 443
#       - name: "ollama"
#         type: systemd
#         port: 11434
#
#     # ── Metadata (optional) ────────────────────────────────────────────────
#     notes: "Primary GPU workstation"  # free-form notes for agent context
#     added: "2026-03-25"              # date registered (YYYY-MM-DD)
#     last_audit: "2026-03-25"         # date of last hardware/service audit

servers: {}
  # Add entries here using templates/server_entry.yaml as a starting point.
  # Each entry must be indented under this `servers:` key.
  # When adding the first entry, replace `{}` above with a newline.
